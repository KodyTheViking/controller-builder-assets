<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Controller Builder</title>

<style>

body{
font-family:Arial, sans-serif;
background:#111;
color:white;
margin:0;
padding:20px;
}

/* LAYOUT */

.container{
max-width:980px;
margin:auto;
display:grid;
grid-template-columns:460px 380px;
gap:40px;
justify-content:center;
align-items:start;
}

/* PREVIEW */

.preview{
position:sticky;
top:20px;
width:460px;
height:460px;

display:grid;
place-items:center;
}

.preview img{
grid-area:1 / 1;
width:100%;
height:100%;
object-fit:contain;
pointer-events:none;
}

.preview.double-neck #inlays{
transform:scale(0.92) translateY(12px);
transform-origin:center;
}

/* LAYER ORDER */

#bg{z-index:1;}
#base{z-index:2;}
#inlays{z-index:3;}
#pickguard{z-index:4;}
#hardware{z-index:5;}

/* CONTROLS */

.controls{
width:420px;
text-align:left;
}

.controls h1{
text-align:center;
margin-bottom:20px;
}

.controls h3{
margin-top:18px;
}

label{
display:block;
margin-top:10px;
}

select{
padding:8px;
margin-top:5px;
width:100%;
}

button{
width:100%;
padding:10px;
margin-top:10px;
cursor:pointer;
}

/* SWATCHES */

.swatches{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:10px;
}

.swatch{
width:32px;
height:32px;
border-radius:4px;
cursor:pointer;
border:2px solid transparent;
}

.swatch.active{
border:2px solid white;
}

.swatch.rainbow{
background:linear-gradient(
90deg,
red,
orange,
yellow,
green,
blue,
indigo,
violet
);
}

/* SUMMARY */

textarea{
width:100%;
height:120px;
margin-top:10px;
background:#222;
color:white;
border:none;
padding:10px;
}

.price{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

/* MOBILE */

@media (max-width:900px){

.container{
grid-template-columns:1fr;
}

.preview{
margin:auto;
position:relative;
}

.controls{
width:100%;
}

}

</style>

</head>

<body>

<div class="container">

<div class="preview">

<img id="bg">
<img id="base">
<img id="inlays">
<img id="pickguard">
<img id="hardware">

</div>

<div class="controls">

<h1>Custom Guitar Controller Builder</h1>

<label>Controller Model</label>

<select id="model">
<option value="barbarian">Barbarian</option>
<option value="bard">Bard</option>
<option value="doubleneck">Bard (Double Neck)</option>
<option value="necromancer">Necromancer</option>
<option value="paladin">Paladin</option>
<option value="ranger">Ranger</option>
</select>

<div id="headstockSection">

<h3>Headstock</h3>

<select id="headstockSelect"></select>

</div>

<h3>Base Color</h3>
<div id="baseSwatches" class="swatches"></div>

<h3>Inlays</h3>
<select id="inlaysSelect"></select>

<h3>Pickguard</h3>
<div id="pickguardSwatches" class="swatches"></div>

<div class="price">
Total Price: <span id="price">$200</span>
</div>

<button onclick="resetBuilder()">Reset Build</button>
<button onclick="shareBuild()">Share Build</button>

<h3>Your Build</h3>

<textarea id="summary" readonly></textarea>

</div>

</div>

<script>

const ROOT="https://kodytheviking.github.io/controller-builder-assets/";

/* MODEL CONFIG */

const MODELS={

barbarian:{
folder:"barbarian",
price:200,
pickguard:false,
headstocks:["r","l"]
},

bard:{
folder:"bard",
price:200,
pickguard:true,
headstocks:["r","l"]
},

doubleneck:{
folder:"double-neck",
price:300,
pickguard:true,
headstocks:null
},

necromancer:{
folder:"necromancer",
price:200,
pickguard:true,
headstocks:["3x3","6"]
},

paladin:{
folder:"paladin",
price:200,
pickguard:true,
headstocks:null
},

ranger:{
folder:"ranger",
price:200,
pickguard:true,
headstocks:null
}

};

const COLORS=[
"black","white","red","orange","yellow","green","blue","purple","pink","cosmic"
];

const INLAYS=[
"blocks","dots","hate","none",
"onesided","piranhabite","sawtooth","sharkbite"
];

const PICKGUARDS=[...COLORS,"none"];

/* DOM */

const model=document.getElementById("model");
const baseLayer=document.getElementById("base");
const inlaysLayer=document.getElementById("inlays");
const pickguardLayer=document.getElementById("pickguard");
const hardwareLayer=document.getElementById("hardware");
const bgLayer=document.getElementById("bg");

bgLayer.src = ROOT + "background.png";

const headstockSelect=document.getElementById("headstockSelect");
const headstockSection=document.getElementById("headstockSection");

const baseContainer=document.getElementById("baseSwatches");
const pickguardContainer=document.getElementById("pickguardSwatches");
const inlaySelect=document.getElementById("inlaysSelect");

/* BASE COLOR SWATCHES */

COLORS.forEach(color=>{

let sw=document.createElement("div");

sw.className="swatch";
sw.dataset.color=color;

if(color==="cosmic"){
sw.classList.add("rainbow");
}else{
sw.style.background=color;
}

sw.onclick=()=>{

document.querySelectorAll("#baseSwatches .swatch")
.forEach(s=>s.classList.remove("active"));

sw.classList.add("active");

updateBase();

};

baseContainer.appendChild(sw);

});

/* INLAY OPTIONS */

INLAYS.forEach(i=>{

let option=document.createElement("option");

option.value=i;
option.text=i;

inlaySelect.appendChild(option);

});

inlaySelect.onchange=updateInlays;

/* PICKGUARDS */

PICKGUARDS.forEach(pg=>{

let sw=document.createElement("div");

sw.className="swatch";

if(pg!=="none") sw.style.background=pg;

sw.dataset.color=pg;

sw.onclick=()=>{

document.querySelectorAll("#pickguardSwatches .swatch")
.forEach(s=>s.classList.remove("active"));

sw.classList.add("active");

updatePickguard();

};

pickguardContainer.appendChild(sw);

});

/* MODEL CHANGE */

model.onchange=()=>{

const config=MODELS[model.value];

const preview=document.querySelector(".preview");

preview.classList.remove("double-neck");

if(model.value==="doubleneck"){
preview.classList.add("double-neck");
}

/* HARDWARE */

hardwareLayer.src=
ROOT+config.folder+"/hardware.png";

/* COSMIC COLOR ONLY FOR PALADIN */

document.querySelectorAll("#baseSwatches .swatch").forEach(sw=>{

if(sw.dataset.color==="cosmic"){

if(model.value==="paladin"){
sw.style.display="block";
}else{
sw.style.display="none";
}

}

});

/* PRICE */

document.getElementById("price").innerText="$"+config.price;

/* PICKGUARD */

if(config.pickguard){

pickguardContainer.style.display="flex";

pickguardLayer.src=
ROOT+config.folder+"/pickguards/black.png";

}else{

pickguardContainer.style.display="none";

pickguardLayer.src="";

}

/* HEADSTOCK */

if(config.headstocks){

headstockSection.style.display="block";

headstockSelect.innerHTML="";

config.headstocks.forEach((h,i)=>{

let o=document.createElement("option");

o.value=h;

if(h==="r") o.text="Standard";
else if(h==="l") o.text="Reverse";
else if(h==="3x3") o.text="3x3";
else if(h==="6") o.text="6 in line";

headstockSelect.appendChild(o);

});

}else{

headstockSection.style.display="none";

}

/* DEFAULT ASSETS */

updateBase();
updateInlays();

};

/* BASE IMAGE */

function updateBase(){

const config=MODELS[model.value];

let color=
document.querySelector("#baseSwatches .active")?.dataset.color || "black";

let headstock=headstockSelect.value;

let file="";

/* BARBARIAN + BARD */

if(model.value==="barbarian"||model.value==="bard"){

if(!headstock) headstock="r";

file=`base-${color}-${headstock}`;

}

/* NECROMANCER */

else if(model.value==="necromancer"){

if(!headstock) headstock="3x3";

file=`base-${color}${headstock}`;

}

/* DOUBLE NECK + OTHERS */

else{

file=`base-${color}`;

}

/* PALADIN COSMIC OVERRIDE */

if(model.value==="paladin" && color==="cosmic"){
file="base-cosmic";
}

baseLayer.src=
ROOT+config.folder+"/base/"+file+".png";

updateSummary();

}

/* INLAYS */

function updateInlays(){

const config=MODELS[model.value];

inlaysLayer.src=
ROOT+config.folder+"/inlays/"+inlaySelect.value+".png";

updateSummary();

}

/* PICKGUARD */

function updatePickguard(){

const config=MODELS[model.value];

let color=
document.querySelector("#pickguardSwatches .active")?.dataset.color || "black";

pickguardLayer.src=
ROOT+config.folder+"/pickguards/"+color+".png";

updateSummary();

}

/* SUMMARY */

function updateSummary(){

const config=MODELS[model.value];

let baseColor=
document.querySelector("#baseSwatches .active")?.dataset.color || "";

let pickguard=
document.querySelector("#pickguardSwatches .active")?.dataset.color || "none";

let headstock=headstockSelect.value || "";

document.getElementById("summary").value=

`Model: ${model.value}
Headstock: ${headstock}
Base: ${baseColor}
Inlays: ${inlaySelect.value}
Pickguard: ${pickguard}
Price: $${config.price}`;

}

/* RESET */

function resetBuilder(){
location.reload();
}

/* INIT */

model.onchange();

</script>

</body>
</html>
