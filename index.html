<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Controller Builder</title>

<style>

body{
font-family:Arial, sans-serif;
background:#111;
color:white;
text-align:center;
margin:0;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

.preview{
position:relative;
width:500px;
height:500px;
margin:40px auto;
z-index:0;
}

.preview img{
position:absolute;
left:0;
top:0;
width:100%;
pointer-events:none;
}

#bg{z-index:1;}
#base{z-index:2;}
#inlays{z-index:3;}
#pickguard{z-index:4;}
#hardware{z-index:5;}

.swatches{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
margin:10px 0 25px 0;
}

.swatch{
width:32px;
height:32px;
border-radius:4px;
cursor:pointer;
border:2px solid transparent;
}

.swatch.active{
border:2px solid white;
}

select{
padding:8px;
margin:10px;
}

textarea{
width:100%;
height:120px;
margin-top:10px;
background:#222;
color:white;
border:none;
padding:10px;
}

button{
padding:10px 20px;
margin:10px;
cursor:pointer;
}

.price{
font-size:22px;
margin-top:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>Custom Guitar Controller Builder</h1>

<label>Controller Model</label>

<select id="model">
<option value="barbarian">Barbarian</option>
<option value="bard">Bard</option>
<option value="necromancer">Necromancer</option>
<option value="paladin">Paladin</option>
<option value="ranger">Ranger</option>
<option value="doubleneck">Double Neck</option>
</select>

<div class="preview">

<img id="bg">
<img id="base">
<img id="inlays">
<img id="pickguard">
<img id="hardware">

</div>

<h3>Base Color</h3>
<div id="baseSwatches" class="swatches"></div>

<h3>Inlays</h3>
<select id="inlaysSelect"></select>

<h3>Pickguard</h3>
<div id="pickguardSwatches" class="swatches"></div>

<div class="price">
Total Price: <span id="price">$200</span>
</div>

<button onclick="resetBuilder()">Reset Build</button>
<button onclick="shareBuild()">Share Build</button>

<h3>Your Build</h3>

<textarea id="summary" readonly></textarea>

</div>

<script>

/* ASSET LOCATION */

const ROOT="https://raw.githubusercontent.com/KodyTheViking/controller-builder-assets/main/";

/* MODEL CONFIG */

const CONFIG={

barbarian:{base:["base-black-r","base-black-l"],pickguard:false,price:200},
bard:{base:["base-black-r","base-black-l"],pickguard:true,price:200},
necromancer:{base:["base-black3x3","base-black6"],pickguard:true,price:200},
paladin:{base:["base-black"],pickguard:true,price:200},
ranger:{base:["base-black"],pickguard:true,price:200},

doubleneck:{
base:["base-black"],
pickguard:true,
price:300
}

};
const COLORS=["black","white","red","orange","yellow","green","blue","purple","pink"];

const INLAYS=[
"blocks","dots","hate","none",
"onesided","piranhabite","sawtooth","sharkbite"
];

const PICKGUARDS=[...COLORS,"none"];

/* DOM */

const model=document.getElementById("model");

const baseLayer=document.getElementById("base");
const inlaysLayer=document.getElementById("inlays");
const pickguardLayer=document.getElementById("pickguard");
const hardwareLayer=document.getElementById("hardware");
const bgLayer=document.getElementById("bg");

bgLayer.src=ROOT+"background.png";

/* BASE SWATCHES */

const baseContainer=document.getElementById("baseSwatches");

COLORS.forEach(color=>{

let sw=document.createElement("div");
sw.className="swatch";
sw.style.background=color;

sw.onclick=()=>{

document.querySelectorAll("#baseSwatches .swatch")
.forEach(s=>s.classList.remove("active"));

sw.classList.add("active");

let filename="base-"+color;

if(model.value==="barbarian"||model.value==="bard"){
filename+="-r";
}

if(model.value==="necromancer"){
filename+="3x3";
}

baseLayer.src=ROOT+model.value+"/base/"+filename+".png";

saveBuild();
updateSummary();

};

baseContainer.appendChild(sw);

});

/* INLAYS */

const inlaySelect=document.getElementById("inlaysSelect");

INLAYS.forEach(i=>{

let option=document.createElement("option");
option.value=i;
option.text=i;
inlaySelect.appendChild(option);

});

inlaySelect.onchange=()=>{

inlaysLayer.src=
ROOT+model.value+"/inlays/"+inlaySelect.value+".png";

saveBuild();
updateSummary();

};

/* PICKGUARDS */

const pickguardContainer=document.getElementById("pickguardSwatches");

PICKGUARDS.forEach(pg=>{

let sw=document.createElement("div");
sw.className="swatch";

if(pg!=="none") sw.style.background=pg;

sw.onclick=()=>{

document.querySelectorAll("#pickguardSwatches .swatch")
.forEach(s=>s.classList.remove("active"));

sw.classList.add("active");

pickguardLayer.src=
ROOT+model.value+"/pickguards/"+pg+".png";

saveBuild();
updateSummary();

};

pickguardContainer.appendChild(sw);

});

/* MODEL CHANGE */

model.onchange=()=>{

let config=CONFIG[model.value];

baseLayer.src=
ROOT+model.value+"/base/"+config.base[0]+".png";

inlaysLayer.src=
ROOT+model.value+"/inlays/blocks.png";

hardwareLayer.src=
ROOT+model.value+"/hardware.png";

if(config.pickguard){

pickguardLayer.src=
ROOT+model.value+"/pickguards/black.png";

pickguardContainer.style.display="flex";

}else{

pickguardLayer.src="";
pickguardContainer.style.display="none";

}

updatePrice();
saveBuild();
updateSummary();

};

/* PRICE */

function updatePrice(){

let price=CONFIG[model.value].price;

document.getElementById("price").innerText="$"+price;

}

/* BUILD SUMMARY */

function updateSummary(){

let baseColor=
document.querySelector("#baseSwatches .active")?.style.background||"";

let inlay=inlaySelect.value;

let pickguard=
document.querySelector("#pickguardSwatches .active")?.style.background||"none";

document.getElementById("summary").value=

`Model: ${model.value}
Base: ${baseColor}
Inlays: ${inlay}
Pickguard: ${pickguard}
Price: $${CONFIG[model.value].price}`;

}

/* SAVE BUILD */

function saveBuild(){

const build={
model:model.value,
inlays:inlaySelect.value
};

localStorage.setItem("guitarBuild",JSON.stringify(build));

}

/* LOAD BUILD */

function loadBuild(){

const saved=localStorage.getItem("guitarBuild");

if(!saved) return;

const build=JSON.parse(saved);

model.value=build.model;

model.onchange();

inlaySelect.value=build.inlays;

}

/* RESET */

function resetBuilder(){

localStorage.removeItem("guitarBuild");

location.reload();

}

/* SHARE LINK */

function shareBuild(){

const data=btoa(JSON.stringify({
model:model.value,
inlays:inlaySelect.value
}));

const url=window.location.origin+window.location.pathname+"?build="+data;

navigator.clipboard.writeText(url);

alert("Build link copied!");

}

/* LOAD FROM URL */

function loadFromURL(){

const params=new URLSearchParams(window.location.search);

const data=params.get("build");

if(!data) return;

try{

const build=JSON.parse(atob(data));

model.value=build.model;
model.onchange();

inlaySelect.value=build.inlays;

}catch(e){}

}

loadFromURL();
loadBuild();

/* INITIAL LOAD */

model.onchange();

</script>

</body>
</html>
