<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Controller Builder</title>

<style>

body{
font-family:Arial, sans-serif;
background:#111;
color:white;
margin:0;
padding:40px;
}

/* LAYOUT */

.container{
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:520px 420px;
gap:60px;
justify-content:center;
align-items:start;
}

/* PREVIEW */

.preview{
position:sticky;
top:40px;
width:520px;
height:520px;
}

.preview img{
position:absolute;
left:0;
top:0;
width:100%;
pointer-events:none;
}

/* LAYER ORDER */

#bg{z-index:1;}
#base{z-index:2;}
#inlays{z-index:3;}
#pickguard{z-index:4;}
#hardware{z-index:5;}

/* CONTROLS */

.controls{
width:420px;
text-align:left;
}

.controls h1{
text-align:center;
margin-bottom:20px;
}

.controls h3{
margin-top:30px;
}

label{
display:block;
margin-top:10px;
}

select{
padding:8px;
margin-top:5px;
width:100%;
}

button{
width:100%;
padding:10px;
margin-top:10px;
cursor:pointer;
}

/* SWATCHES */

.swatches{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:10px;
}

.swatch{
width:32px;
height:32px;
border-radius:4px;
cursor:pointer;
border:2px solid transparent;
}

.swatch.active{
border:2px solid white;
}

/* SUMMARY */

textarea{
width:100%;
height:120px;
margin-top:10px;
background:#222;
color:white;
border:none;
padding:10px;
}

.price{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

/* MOBILE */

@media (max-width:900px){

.container{
grid-template-columns:1fr;
}

.preview{
margin:auto;
position:relative;
}

.controls{
width:100%;
}

}

</style>

</head>

<body>

<div class="container">

<div class="preview">

<img id="bg">
<img id="base">
<img id="inlays">
<img id="pickguard">
<img id="hardware">

</div>

<div class="controls">

<h1>Custom Guitar Controller Builder</h1>

<label>Controller Model</label>

<select id="model">
<option value="barbarian">Barbarian</option>
<option value="bard">Bard</option>
<option value="doubleneck">Bard (Double Neck)</option>
<option value="necromancer">Necromancer</option>
<option value="paladin">Paladin</option>
<option value="ranger">Ranger</option>
</select>

<div id="headstockSection">

<h3>Headstock</h3>

<select id="headstockSelect"></select>

</div>

<h3>Base Color</h3>
<div id="baseSwatches" class="swatches"></div>

<h3>Inlays</h3>
<select id="inlaysSelect"></select>

<h3>Pickguard</h3>
<div id="pickguardSwatches" class="swatches"></div>

<div class="price">
Total Price: <span id="price">$200</span>
</div>

<button onclick="resetBuilder()">Reset Build</button>
<button onclick="shareBuild()">Share Build</button>

<h3>Your Build</h3>

<textarea id="summary" readonly></textarea>

</div>

</div>

<script>

const ROOT="https://raw.githubusercontent.com/KodyTheViking/controller-builder-assets/main/";

const CONFIG={

barbarian:{
pickguard:false,
price:200,
headstocks:["r","l"]
},

bard:{
pickguard:true,
price:200,
headstocks:["r","l"]
},

doubleneck:{
pickguard:true,
price:300,
headstocks:null
},

necromancer:{
pickguard:true,
price:200,
headstocks:["3x3","6"]
},

paladin:{
pickguard:true,
price:200,
headstocks:null
},

ranger:{
pickguard:true,
price:200,
headstocks:null
}

};

const COLORS=["black","white","red","orange","yellow","green","blue","purple","pink"];

const INLAYS=[
"blocks","dots","hate","none",
"onesided","piranhabite","sawtooth","sharkbite"
];

const PICKGUARDS=[...COLORS,"none"];

/* DOM */

const model=document.getElementById("model");
const headstockSelect=document.getElementById("headstockSelect");
const headstockSection=document.getElementById("headstockSection");

const baseLayer=document.getElementById("base");
const inlaysLayer=document.getElementById("inlays");
const pickguardLayer=document.getElementById("pickguard");
const hardwareLayer=document.getElementById("hardware");
const bgLayer=document.getElementById("bg");

bgLayer.src=ROOT+"background.png";

/* BASE COLORS */

const baseContainer=document.getElementById("baseSwatches");

COLORS.forEach(color=>{

let sw=document.createElement("div");

sw.className="swatch";
sw.style.background=color;

sw.onclick=()=>{

document.querySelectorAll("#baseSwatches .swatch")
.forEach(s=>s.classList.remove("active"));

sw.classList.add("active");

updateBase();

};

baseContainer.appendChild(sw);

});

/* INLAYS */

const inlaySelect=document.getElementById("inlaysSelect");

INLAYS.forEach(i=>{

let option=document.createElement("option");

option.value=i;
option.text=i;

inlaySelect.appendChild(option);

});

inlaySelect.onchange=()=>{

inlaysLayer.src=
ROOT+model.value+"/inlays/"+inlaySelect.value+".png";

updateSummary();

};

/* PICKGUARDS */

const pickguardContainer=document.getElementById("pickguardSwatches");

PICKGUARDS.forEach(pg=>{

let sw=document.createElement("div");

sw.className="swatch";

if(pg!=="none") sw.style.background=pg;

sw.onclick=()=>{

document.querySelectorAll("#pickguardSwatches .swatch")
.forEach(s=>s.classList.remove("active"));

sw.classList.add("active");

pickguardLayer.src=
ROOT+model.value+"/pickguards/"+pg+".png";

updateSummary();

};

pickguardContainer.appendChild(sw);

});

/* HEADSTOCK SELECT */

headstockSelect.onchange=updateBase;

/* MODEL CHANGE */

model.onchange=()=>{

let config=CONFIG[model.value];

hardwareLayer.src=
ROOT+model.value+"/hardware.png";

/* HEADSTOCK OPTIONS */

if(config.headstocks){

headstockSection.style.display="block";

headstockSelect.innerHTML="";

config.headstocks.forEach((h,i)=>{

let o=document.createElement("option");

o.value=h;
o.text=h;

if(i===0) o.selected=true;

headstockSelect.appendChild(o);

});

}

/* PICKGUARD */

if(config.pickguard){

pickguardLayer.src=
ROOT+model.value+"/pickguards/black.png";

pickguardContainer.style.display="flex";

}else{

pickguardLayer.src="";
pickguardContainer.style.display="none";

}

inlaysLayer.src=
ROOT+model.value+"/inlays/blocks.png";

document.getElementById("price").innerText="$"+config.price;

updateBase();

};

/* BASE IMAGE */

function updateBase(){

let color =
document.querySelector("#baseSwatches .active")?.style.background || "black";

let headstock = headstockSelect.value;

let file = "";

/* BARBARIAN + BARD */

if(model.value === "barbarian" || model.value === "bard"){

file = "base-" + color + "-" + headstock;

}

/* NECROMANCER */

else if(model.value === "necromancer"){

file = "base-" + color + headstock;

}

/* DOUBLE NECK + OTHERS */

else{

file = "base-" + color;

}

baseLayer.src =
ROOT + model.value + "/base/" + file + ".png";

updateSummary();

}

/* NECROMANCER */

else if(model.value === "necromancer"){

file = "base-" + color + headstock;

}

/* DOUBLE NECK + OTHERS */

else{

file = "base-" + color;

}

baseLayer.src =
ROOT + model.value + "/base/" + file + ".png";

updateSummary();

}
/* SUMMARY */

function updateSummary(){

let baseColor=
document.querySelector("#baseSwatches .active")?.style.background||"";

let inlay=inlaySelect.value;

let pickguard=
document.querySelector("#pickguardSwatches .active")?.style.background||"none";

let headstock=headstockSelect.value||"standard";

document.getElementById("summary").value=

`Model: ${model.value}
Headstock: ${headstock}
Base: ${baseColor}
Inlays: ${inlay}
Pickguard: ${pickguard}
Price: $${CONFIG[model.value].price}`;

}

/* RESET */

function resetBuilder(){

location.reload();

}

/* SHARE */

function shareBuild(){

const data=btoa(JSON.stringify({
model:model.value,
headstock:headstockSelect.value,
inlays:inlaySelect.value
}));

const url=window.location.origin+window.location.pathname+"?build="+data;

navigator.clipboard.writeText(url);

alert("Build link copied!");

}

/* INIT */

model.onchange();

</script>

</body>
</html>
