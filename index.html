<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Controller Builder</title>

<style>

body{
font-family:Arial, sans-serif;
background:#111;
color:white;
margin:0;
padding:20px;
}

/* LAYOUT */

.container{
max-width:900px;
margin:auto;
display:grid;
grid-template-columns:380px 360px;
gap:30px;
justify-content:center;
align-items:start;
}

/* PREVIEW */

.preview{
position:relative;
width:380px;
margin:auto;
}

.preview img{
position:absolute;
top:0;
left:0;
width:100%;
height:auto;
pointer-events:none;
image-rendering:auto;
}

/* small correction for double neck */

.preview.double-neck #inlays{
transform:translateX(-1px);
}
  
/* LAYER ORDER */

#bg{z-index:1;}
#base{z-index:2;}
#inlays{z-index:3;}
#pickguard{z-index:4;}
#hardware{z-index:5;}

/* CONTROLS */

.controls{
width:360px;
text-align:left;
}

.controls h1{
text-align:center;
margin-bottom:20px;
}

.controls h3{
margin-top:18px;
}

label{
display:block;
margin-top:10px;
}

select{
padding:8px;
margin-top:5px;
width:100%;
}

button{
width:100%;
padding:10px;
margin-top:10px;
cursor:pointer;
}

/* SWATCHES */

.swatches{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:10px;
}

.swatch{
width:32px;
height:32px;
border-radius:4px;
cursor:pointer;
border:2px solid transparent;
background-size:contain;
background-repeat:no-repeat;
background-position:center;
}

.swatch.active{
border:2px solid white;
}

.swatch.rainbow{
background:linear-gradient(
90deg,
red,
orange,
yellow,
green,
blue,
indigo,
violet
);
}

/* SUMMARY */

textarea{
width:100%;
height:120px;
margin-top:10px;
background:#222;
color:white;
border:none;
padding:10px;
}

.price{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

/* MOBILE */

@media (max-width:900px){

.container{
grid-template-columns:1fr;
}

.preview{
margin:auto;
}

.controls{
width:100%;
}

}

</style>

</head>

<body>

<div class="container">

<div class="preview">

<img id="bg" style="position:relative;">
<img id="base">
<img id="inlays">
<img id="pickguard">
<img id="hardware">

</div>

<div class="controls">

<h1>Custom Guitar Controller Builder</h1>

<label>Controller Model</label>

<select id="model">
<option value="barbarian">Barbarian</option>
<option value="bard">Bard</option>
<option value="doubleneck">Bard (Double Neck)</option>
<option value="necromancer">Necromancer</option>
<option value="paladin">Paladin</option>
<option value="ranger">Ranger</option>
</select>

<div id="headstockSection">

<h3>Headstock</h3>

<select id="headstockSelect"></select>

</div>

<h3>Base Color</h3>
<div id="baseSwatches" class="swatches"></div>

<h3>Inlay Style</h3>
<div id="inlayStyleSwatches" class="swatches"></div>

<h3>Inlay Color</h3>
<div id="inlayColorSwatches" class="swatches"></div>

<h3>Pickguard</h3>
<div id="pickguardSwatches" class="swatches"></div>

<div class="price">
Total Price: <span id="price">$200</span>
</div>

<button onclick="resetBuilder()">Reset Build</button>
<button onclick="shareBuild()">Share Build</button>

<h3>Your Build</h3>

<textarea id="summary" readonly></textarea>

</div>

</div>

<script>

const ROOT="https://kodytheviking.github.io/controller-builder-assets/";

/* MODEL CONFIG */

const MODELS={

barbarian:{folder:"barbarian",price:200,pickguard:false,headstocks:["r","l"]},

bard:{folder:"bard",price:200,pickguard:true,headstocks:["r","l"]},

doubleneck:{folder:"double-neck",price:300,pickguard:true,headstocks:null},

necromancer:{folder:"necromancer",price:200,pickguard:true,headstocks:["3x3","6"]},

paladin:{folder:"paladin",price:200,pickguard:true,headstocks:null},

ranger:{folder:"ranger",price:200,pickguard:true,headstocks:null}

};

const COLORS=["black","white","red","orange","yellow","green","blue","purple","pink","cosmic"];

const PICKGUARD_COLORS=[
"black","white","red","orange","yellow","green","blue","purple","pink","none"
];

const INLAY_COLORS=[
"black","white","red","orange","yellow","green","blue","purple","pink","none"
];

const INLAYS=["blocks","dots","hate","onesided","piranhabite","sawtooth","sharkbite"];


/* DOM */

const model=document.getElementById("model");
const baseLayer=document.getElementById("base");
const inlaysLayer=document.getElementById("inlays");
const pickguardLayer=document.getElementById("pickguard");
const hardwareLayer=document.getElementById("hardware");
const bgLayer=document.getElementById("bg");

bgLayer.src = ROOT+"background.png";

const headstockSelect=document.getElementById("headstockSelect");
const headstockSection=document.getElementById("headstockSection");

const baseContainer=document.getElementById("baseSwatches");
const pickguardContainer=document.getElementById("pickguardSwatches");
const inlayStyleContainer=document.getElementById("inlayStyleSwatches");
const inlayColorContainer=document.getElementById("inlayColorSwatches");

/* BASE COLOR SWATCHES */

COLORS.forEach(color=>{

let sw=document.createElement("div");

sw.className="swatch";
sw.dataset.color=color;

if(color==="cosmic"){sw.classList.add("rainbow");}
else{sw.style.background=color;}

sw.onclick=()=>{

document.querySelectorAll("#baseSwatches .swatch").forEach(s=>s.classList.remove("active"));

sw.classList.add("active");

updateBase();

};

baseContainer.appendChild(sw);

});

/* INLAY STYLE SWATCHES */

INLAYS.forEach(style=>{

let sw=document.createElement("div");

sw.className="swatch";

sw.style.backgroundImage=`url(${ROOT}inlay-thumbs/${style}.png)`;

sw.dataset.style=style;

sw.onclick=()=>{

document.querySelectorAll("#inlayStyleSwatches .swatch").forEach(s=>s.classList.remove("active"));

sw.classList.add("active");

updateInlays();

};

inlayStyleContainer.appendChild(sw);

});

/* INLAY COLOR SWATCHES */

INLAY_COLORS.forEach(color=>{

let sw=document.createElement("div");

sw.className="swatch";

if(color==="none"){

sw.style.background="#222";
sw.style.border="2px dashed #777";

}else{

sw.style.background=color;

}

sw.dataset.color=color;

sw.onclick=()=>{

document.querySelectorAll("#inlayColorSwatches .swatch").forEach(s=>s.classList.remove("active"));

sw.classList.add("active");

updateInlays();

};

inlayColorContainer.appendChild(sw);

});

/* PICKGUARDS */

PICKGUARD_COLORS.forEach(pg=>{

let sw=document.createElement("div");

sw.className="swatch";

if(pg==="none"){

sw.style.background="#222";
sw.style.border="2px dashed #777";

}else{

sw.style.background=pg;

}
sw.dataset.color=pg;

sw.onclick=()=>{

document.querySelectorAll("#pickguardSwatches .swatch").forEach(s=>s.classList.remove("active"));

sw.classList.add("active");

updatePickguard();

};

pickguardContainer.appendChild(sw);

});

/* MODEL CHANGE */

model.onchange=()=>{

const config=MODELS[model.value];

const preview=document.querySelector(".preview");

preview.className="preview";

/* COSMIC COLOR ONLY FOR PALADIN */

document.querySelectorAll("#baseSwatches .swatch").forEach(sw=>{

if(sw.dataset.color==="cosmic"){

if(model.value==="paladin"){
sw.style.display="inline-block";
}else{
sw.style.display="none";
}

}

});

if(model.value==="doubleneck"){
preview.classList.add("double-neck");
}

hardwareLayer.src=ROOT+config.folder+"/hardware.png";

document.getElementById("price").innerText="$"+config.price;

/* PICKGUARD */

if(config.pickguard){

pickguardContainer.style.display="flex";
pickguardLayer.src=ROOT+config.folder+"/pickguards/black.png";

}else{

pickguardContainer.style.display="none";
pickguardLayer.src="";

}

/* HEADSTOCK */

if(config.headstocks){

headstockSection.style.display="block";
headstockSelect.innerHTML="";

config.headstocks.forEach(h=>{

let o=document.createElement("option");

o.value=h;

if(h==="r") o.text="Standard";
else if(h==="l") o.text="Reverse";
else if(h==="3x3") o.text="3x3";
else if(h==="6") o.text="6 in line";

headstockSelect.appendChild(o);

});

}else{

headstockSection.style.display="none";

}

updateBase();
updateInlays();

};

/* BASE IMAGE */

function updateBase(){

const config=MODELS[model.value];

let color=document.querySelector("#baseSwatches .active")?.dataset.color || "black";

let headstock=headstockSelect.value;

let file="";

if(model.value==="barbarian"||model.value==="bard"){

if(!headstock) headstock="r";

file=`base-${color}-${headstock}`;

}

else if(model.value==="necromancer"){

if(!headstock) headstock="3x3";

file=`base-${color}${headstock}`;

}

else{

file=`base-${color}`;

}

if(model.value==="paladin" && color==="cosmic"){file="base-cosmic";}

baseLayer.src=ROOT+config.folder+"/base/"+file+".png";

updateSummary();

}

/* INLAYS */

function updateInlays(){

let style=document.querySelector("#inlayStyleSwatches .active")?.dataset.style || "blocks";

let color=document.querySelector("#inlayColorSwatches .active")?.dataset.color || "none";

let folder="inlays";

if(model.value==="doubleneck"){folder="double-neck inlays";}

if(color==="none"){
inlaysLayer.src="";
}else{
inlaysLayer.src=ROOT+folder+"/"+color+"/"+style+".png";
}

updateSummary();

}

/* PICKGUARD */

function updatePickguard(){

const config=MODELS[model.value];

let color=document.querySelector("#pickguardSwatches .active")?.dataset.color || "black";

pickguardLayer.src=ROOT+config.folder+"/pickguards/"+color+".png";

updateSummary();

}

/* SUMMARY */

function updateSummary(){

const config=MODELS[model.value];

let baseColor=document.querySelector("#baseSwatches .active")?.dataset.color || "";

let style=document.querySelector("#inlayStyleSwatches .active")?.dataset.style || "";

let color=document.querySelector("#inlayColorSwatches .active")?.dataset.color || "";

let pickguard=document.querySelector("#pickguardSwatches .active")?.dataset.color || "none";

let headstock=headstockSelect.value || "";

document.getElementById("summary").value=

`Model: ${model.value}
Headstock: ${headstock}
Base: ${baseColor}
Inlays: ${style} (${color})
Pickguard: ${pickguard}
Price: $${config.price}`;

}

/* RESET */

function resetBuilder(){
location.reload();
}

/* INIT */

model.onchange();

</script>

</body>
</html>
